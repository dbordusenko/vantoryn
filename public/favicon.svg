<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="10" y1="5" x2="90" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8c96a"/>
      <stop offset="45%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07828"/>
    </linearGradient>
    <linearGradient id="inner" x1="30" y1="15" x2="70" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8c96a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8c96a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Outer V -->
  <path d="M 10 12 L 50 82 L 90 12" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
