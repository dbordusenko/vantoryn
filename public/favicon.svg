  <path d="M 22 12 L 50 68 L 78 12" stroke="url(#inner)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Diamond -->
  <path d="M 50 60 L 56 72 L 50 84 L 44 72 Z" fill="url(#gold)" opacity="0.9"/>
  <!-- Left arc -->
  <path d="M 9 35 A 42 42 0 0 1 46 88" stroke="url(#arc)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Right arc -->
  <path d="M 54 88 A 42 42 0 0 1 91 35" stroke="url(#arc)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Cap ticks -->
  <line x1="6" y1="12" x2="24" y2="12" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <line x1="76" y1="12" x2="94" y2="12" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
</svg>
